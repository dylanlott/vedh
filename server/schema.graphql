scalar Time

type Mutation {
  signup(username: String!, password: String!): User!
  login(username: String!, password: String!): User!
  createGame(input: InputCreateGame!): Game!
  joinGame(input: InputJoinGame): Game!
  updateGame(input: InputGame!): Game!
  updateBoardState(input: InputBoardState!): BoardState!
}

type Query {
  users(userID: String): [String!]!
  games(offset: Int!, limit: Int!): [Game]!
  getGame(gameID: String!): Game!
  card(name: String!, id: String): Card
  cards(list: [String!]): [Card!]!
  search(name: String, colors: [String], colorIdentity: [String], keywords: [String]): [Card]
  searchAll(name: String, colors: [String], colorIdentity: [String], keywords: [String]): [Card]
}

type Subscription {
  gameUpdated(gameID: String!, userID: String!): Game!
  # Stream per-user boardstate updates. Clients should provide a unique obsID
  # (e.g., userID+tabId) so reconnects replace old observers cleanly.
  boardstateUpdated(obsID: String!, userID: String!): BoardState!
}

type Card {
  FaceName: String
  Name: String!
  ID: String!
  Quantity: Int
  Tapped: Boolean
  Flipped: Boolean
  Counters: [Counter] 
  Colors: String
  ColorIdentity: String
  FaceManaValue: String
  FaceConvertedManaCost: String
  CMC: String
  ManaCost: String
  UUID: String
  Power: String
  Toughness: String
  Types: String
  Subtypes: String
  Supertypes: String
  Text: String
  TCGID: String
  ScryfallID: String
  ScreenX: Float
  ScreenY: Float
  CurrentZone: String
}

type User {
  ID: String!
  Username: String!
  Password: String
  Token: String
  Boardstate: BoardState
}

type Game {
  ID: String!
  CreatedAt: Time!
  Rules: [Rule!]
  Turn: Turn
  Players: [User]
  Stack: [Card]
}

type Turn {
  Player: String!
  Phase: String!
  Number: Int!
}

type Rule {
  Name: String!
  Value: String!
}

type Counter {
  Name: String!
  Value: String!
}

type BoardState {
  UserID: String!
  User: String!
  Life: Int! 
  GameID: String!
  Commander: [Card!]!
  Library: [Card!]!
  Graveyard: [Card!]!
  Exiled: [Card!]!
  Battlefield: [Card!]!
  Hand: [Card!]!
  Revealed: [Card!]!
  Controlled: [Card!]!
  Counters: [Counter!]
}

input InputCard {
  FaceName: String
  Name: String!
  ID: String!
  Quantity: Int
  Tapped: Boolean
  Flipped: Boolean
  Counters: [InputCounter] 
  Colors: String
  ColorIdentity: String
  FaceManaValue: String
  FaceConvertedManaCost: String
  CMC: String
  ManaCost: String
  UUID: String
  Power: String
  Toughness: String
  Types: String
  Subtypes: String
  Supertypes: String
  Text: String
  TCGID: String
  ScryfallID: String
  ScreenX: Float
  ScreenY: Float
  CurrentZone: String
}

input InputCounter {
  Source: InputCard
  Name: String!
  Value: String!
}

input InputBoardState {
  UserID: String!
  User: String!
  GameID: String!
  Life: Int!
  Decklist: String,
  Commander: [InputCard]
  Library: [InputCard]
  Graveyard: [InputCard]
  Exiled: [InputCard]
  Battlefield: [InputCard]
  Hand: [InputCard]
  Revealed: [InputCard]
  Controlled: [InputCard]
  Counters: [InputCounter]
}

input InputSignup {
  Username: String!
  Email: String!
  Password: String!
}

input InputUser {
  ID: String
  Username: String!
  Boardstate: InputBoardState
}

input InputCreateGame {
  ID: String!
  Turn: InputTurn!
  Handle: String
  Players: [InputBoardState!]!
}

input InputJoinGame {
  ID: String!
  Decklist: String
  BoardState: InputBoardState!
}

input InputGame {
  ID: String!
  Turn: InputTurn
  CreatedAt: Time
  Handle: String
  Rules: [InputRule]
  Players: [InputUser!]
  Stack: [InputCard]
}

input InputRule {
  Name: String!
  Value: String!
}

input InputTurn {
  Player: String!
  Phase: String !
  Number: Int!
}

input InputDeck {
  Name: String
  Commander: [String!]
  Cards: [String!]
}

input InputLabel {
  Name: String!
  Value: String!
  AssignedBy: String!
}