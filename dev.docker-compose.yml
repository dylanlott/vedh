version: "3.7"
services:
  web:
    build:
      dockerfile: ./frontend/Dockerfile
      context: ./frontend
    links:
      - server:server
    ports:
      - 8080:80
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
  server:
    image: dylanlott/edhgo-server
    env_file:
      - .edhgo.env
    ports:
      - 8081:8080
    links:
      - redis:redis
      - postgres:postgres
    volumes:
      - "./persistence/migrations/:/app/persistence/migrations/"
    depends_on:
      - postgres
      - redis
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
  redis:
    image: redis
    volumes:
      - redis-data:/data
    ports:
      - 6379:6379
  postgres:
    image: bitnami/postgresql
    volumes:
      - postgres-data:/bitnami/postgresql
    env_file:
      - ./.pg.env
    ports:
      - 5432:5432
volumes:
  redis-data:
  postgres-data:
