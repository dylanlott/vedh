version: "3.7"
services:
  web:
    image: dylanlott/edhgo-ui
    links:
      - server:server
    ports:
      - 8080:80
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    environment:
      - WATCHTOWER_POLL_INTERVAL=60
  server:
    image: dylanlott/edhgo-server
    env_file:
      - .edhgo.env
    ports:
      - 8081:8080
    links:
      - redis:redis
      - postgres:postgres
    depends_on:
      - postgres
      - redis
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    environment:
      - WATCHTOWER_POLL_INTERVAL=60
  redis:
    image: redis:latest
    volumes:
      - redis-data:/data
        # ports:
        #   - 6379:6379
  postgres:
    image: bitnami/postgresql
    volumes:
      - postgres-data:/bitnami/postgresql
        #    ports:
        # - 5432
    env_file:
      - ./.pg.env
volumes:
  redis-data:
  postgres-data:
