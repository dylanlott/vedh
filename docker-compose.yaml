version: "3.7"

services:
  web:
    build: frontend/
    links:
      - server:server
    ports:
      - 9090:80
  server:
    build: .
    environment:
      REDIS_URL: redis:6379
      POSTGRES_URL: postgres:5432
    ports:
      - 8080:8080
    links:
      - redis:redis
      - postgres:postgres
  redis:
    image: redis:latest
    volumes:
      - redis-data:/data
    ports:
      - 6378:6379
  postgres:
    image: bitnami/postgresql
    volumes:
      - postgres-data:/bitnami/postgresql
    ports:
      - 5433:5432
    environment:
      - POSTGRESQL_USERNAME=edhgo
      - POSTGRESQL_PASSWORD=edhgo
      - POSTGRESQL_DATABASE=edhgo
volumes:
  redis-data:
  postgres-data:
