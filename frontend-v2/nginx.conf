server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Serve static assets with long cache time
  location ~* \/assets\/.*\.(js|css|png|jpg|jpeg|gif|svg|webp|woff2?|ttf|eot)$ {
    try_files $uri =404;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # Fallback for SPA routes to index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Disable logging of health checks or OPTIONS if desired
  location = /health {
    access_log off;
    return 200 'ok';
  }
}
